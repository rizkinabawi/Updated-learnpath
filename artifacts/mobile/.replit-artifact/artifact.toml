kind = "mobile"
previewPath = "/"
title = "LearningPath"
version = "1.0.0"
id = "artifacts/mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18115

[services.development]
run = "pnpm --filter @workspace/mobile run dev"

# The mobile (Expo) artifact is for local development only. The web build of
# this Expo app is published via the separate `web` artifact, which calls
# `expo export --platform web`. Mobile is intentionally excluded from
# deployment by leaving production with a no-op build and a static empty serve.
[services.production]
build = [ "true" ]
serve = "static"
publicDir = "artifacts/mobile/.replit-artifact/empty"

[services.env]
PORT = "18115"
BASE_PATH = "/"
