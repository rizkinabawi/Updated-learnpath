<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearningPath | Activation Key Manager</title>
    <!-- Use local-style CDN but forced as global scripts to match GUI CLI's behavior -->
    <script src="https://cdn.jsdelivr.net/npm/@noble/hashes@1.3.1/sha512.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@noble/hashes@1.3.1/utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@noble/ed25519@2.0.0/lib/index.js"></script>
    <style>
        #app { display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; transition: width 0.3s; background: #111520; color: white; display: flex; flex-direction: column; }
        .main-content { flex: 1; overflow-y: auto; background: #f8fafc; padding: 20px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .nav-item { padding: 12px 20px; cursor: pointer; border: none; background: none; color: #8892b0; text-align: left; width: 100%; font-size: 14px; }
        .nav-item:hover { background: #1e2436; color: white; }
        .nav-item.active { background: #4f6ef7; color: white; }
        .premium-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .code-box { background: #0f172a; color: #38bdf8; padding: 12px; border-radius: 6px; font-family: monospace; position: relative; margin-top: 10px; word-break: break-all; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        .btn-primary { background: #4f6ef7; color: white; }
        .btn-outline { border: 1px solid #e2e8f0; background: white; color: #64748b; }
        .hidden { display: none; }
        .mt-20 { margin-top: 20px; }
        .alert { padding: 12px; border-radius: 6px; margin-top: 10px; font-weight: 700; }
        .alert.success { background: #dcfce7; color: #166534; }
        textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; min-height: 100px; }
    </style>
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div style="padding: 24px; font-size: 20px; font-weight: 800;">LP KeyManager</div>
            <nav>
                <button class="nav-item active" data-tab="keypair">Keypair</button>
                <button class="nav-item" data-tab="sign">Issue Key</button>
                <button class="nav-item" data-tab="token">Buyer Token</button>
                <button class="nav-item" data-tab="verify">Verify</button>
            </nav>
        </aside>

        <main class="main-content">
            <section id="tab-keypair" class="tab-panel active">
                <div class="premium-card">
                    <h2>Keypair</h2>
                    <p>Current Ed25519 Engine: <span id="engine-status">Checking...</span></p>
                    <button class="btn btn-primary" id="btn-keygen">Generate New Keypair</button>
                    <div id="keygen-result" class="hidden">
                        <div class="mt-20">
                            <strong>Private Key:</strong>
                            <div class="code-box" id="sk-val"></div>
                        </div>
                        <div class="mt-20">
                            <strong>Public Key:</strong>
                            <div class="code-box" id="pk-val"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="tab-sign" class="tab-panel">
                <div class="premium-card">
                    <h2>Issue Activation Key</h2>
                    <div class="mt-20">
                        <label>Master Private Key (Hex)</label><br/>
                        <input type="text" id="sign-sk" style="width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ddd;" />
                    </div>
                    <div class="mt-20">
                        <label>App ID</label><br/>
                        <input type="text" id="sign-appid" value="learningpath" style="width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ddd;" />
                    </div>
                    <button class="btn btn-primary mt-20" id="btn-sign">Generate Signatures</button>
                    <div id="sign-result" class="mt-20 hidden">
                        <strong>Result JSON:</strong>
                        <div class="code-box" id="sign-output"></div>
                    </div>
                </div>
            </section>

            <section id="tab-token" class="tab-panel">
                <div class="premium-card">
                    <h2>Buyer Token</h2>
                    <input type="text" id="buyer-sk" placeholder="Creator Secret Key" style="width:100%; padding:10px; margin-bottom:10px;" />
                    <input type="text" id="buyer-bundle" placeholder="Bundle ID" style="width:100%; padding:10px; margin-bottom:10px;" />
                    <input type="text" id="buyer-id" placeholder="Buyer ID" style="width:100%; padding:10px; margin-bottom:10px;" />
                    <input type="text" id="buyer-creator" placeholder="Creator ID" style="width:100%; padding:10px; margin-bottom:10px;" />
                    <button class="btn btn-primary" id="btn-token">Create Token</button>
                    <div id="token-result" class="hidden"><div class="code-box" id="token-output"></div></div>
                </div>
            </section>

            <section id="tab-verify" class="tab-panel">
                <div class="premium-card">
                    <h2>Verify Integrity</h2>
                    <textarea id="verify-input" placeholder="Paste JSON Key or Token here..."></textarea>
                    <input type="text" id="verify-pk" placeholder="Hex Public Key" style="width:100%; padding:10px; margin-top:10px;" />
                    <button class="btn btn-primary mt-20" id="btn-verify">Verify Now</button>
                    <div id="verify-status"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- BOOTSTRAP SCRIPT (NO MODULE) -->
    <script>
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                item.classList.add('active');
                document.getElementById('tab-' + item.dataset.tab).classList.add('active');
            });
        });

        // Initialize Crypto (Matches GUI CLI EXACTLY)
        (function() {
            setTimeout(() => {
                if (window.nobleEd25519 && window.nobleHashes) {
                    const ed = window.nobleEd25519;
                    const hashes = window.nobleHashes;
                    ed.utils.sha512Sync = (...m) => hashes.sha512(hashes.utils.concatBytes(...m));
                    document.getElementById('engine-status').textContent = 'Ed25519 Native+SHA512 Ready';
                } else {
                    document.getElementById('engine-status').textContent = 'ERROR: No Crypto Library Found';
                }
            }, 500);
        })();
    </script>

    <!-- MAIN SCRIPT (MODULE) -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
