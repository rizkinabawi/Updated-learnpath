<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearningPath | Master Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@noble/ed25519@3.1.0/lib/index.min.js"></script>
    <style>
        :root { --p: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; text-align: center; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.sub { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #6366f1; margin-bottom: 8px; }
        input, select { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 12px 16px; border-radius: 12px; color: white; outline: none; font-size: 15px; box-sizing: border-box; }
        input:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .flex { display: flex; gap: 10px; }
        button { width: 100%; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5); }
        #output { background: #020617; padding: 20px; border-radius: 16px; margin-top: 25px; border: 1px dashed #334155; display: none; }
        pre { margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #a5f3fc; white-space: pre-wrap; word-break: break-all; }
        .copy-btn { margin-top: 10px; background: transparent; border: 1px solid #334155; padding: 8px; font-size: 12px; color: #94a3b8; }
        .badge { background: rgba(34, 197, 94, 0.1); color: #4ade80; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="text-align: center;"><span class="badge">SECURED BY ED25519 V3.1</span></div>
        <h1>LearningPath Master</h1>
        <p class="sub">Alat portabel untuk menerbitkan kunci aktivasi.</p>

        <div class="form-group">
            <label>Master Private Key (Hidden)</label>
            <input type="password" id="sk" value="fe24bf455a4319b6334565778bdfacd8b134da1541d5f8492cf675e07b206579">
        </div>

        <div class="form-group">
            <label>Device ID (Opsional)</label>
            <input type="text" id="device" placeholder="Contoh: 7fb3d3ee68286050">
        </div>

        <div class="form-group">
            <label>Masa Berlaku</label>
            <div class="flex">
                <input type="number" id="val" value="36500">
                <select id="unit">
                    <option value="min">Menit</option>
                    <option value="day" selected>Hari</option>
                    <option value="month">Bulan</option>
                </select>
            </div>
        </div>

        <button onclick="generate()">GENERATE TOKEN SEKARANG</button>

        <div id="output">
            <pre id="result"></pre>
            <button class="copy-btn" onclick="copy()">SALIN DATA JSON</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/noble-hashes/1.3.1/sha256.min.js"></script>
    <script>
        const utf8 = (s) => {
            const bytes = [];
            for (let i = 0; i < s.length; i++) {
                let c = s.charCodeAt(i);
                if (c < 0x80) bytes.push(c);
                else if (c < 0x800) { bytes.push(0xc0 | (c >> 6)); bytes.push(0x80 | (c & 0x3f)); }
                else if (c < 0xd800 || c >= 0xe000) {
                    bytes.push(0xe0 | (c >> 12)); bytes.push(0x80 | ((c >> 6) & 0x3f)); bytes.push(0x80 | (c & 0x3f));
                } else {
                    i++; c = 0x10000 + (((c & 0x3ff) << 10) | (s.charCodeAt(i) & 0x3ff));
                    bytes.push(0xf0 | (c >> 18)); bytes.push(0x80 | ((c >> 12) & 0x3f));
                    bytes.push(0x80 | ((c >> 6) & 0x3f)); bytes.push(0x80 | (c & 0x3f));
                }
            }
            return new Uint8Array(bytes);
        };

        const toBase64 = b => btoa(String.fromCharCode(...b));
        const fromHex = h => {
            const c = h.replace(/[^0-9a-fA-F]/g, '');
            const o = new Uint8Array(c.length / 2);
            for (let i = 0; i < o.length; i++) o[i] = parseInt(c.substr(i * 2, 2), 16);
            return o;
        };

        async function generate() {
            try {
                const skHex = document.getElementById('sk').value;
                const device = document.getElementById('device').value.trim();
                const v = parseFloat(document.getElementById('val').value);
                const u = document.getElementById('unit').value;

                let mult = 86400000;
                if(u==='min') mult = 60000;
                if(u==='month') mult = 86400000 * 30;

                const ia = Date.now();
                const ex = ia + (v * mult);
                const appId = "learningpath";

                const msg = utf8(`${appId}|${ia}|${ex}|${device}`);
                const sk = fromHex(skHex);
                
                // Noble Ed25519 v2/v3 support
                const sig = await nobleEd25519.sign(msg, sk);
                
                const res = { appId, issuedAt: ia, expiry: ex, signature: toBase64(sig) };
                if (device) res.deviceId = device;

                document.getElementById('result').textContent = JSON.stringify(res, null, 2);
                document.getElementById('output').style.display = 'block';
            } catch(e) { alert(e.message); }
        }

        function copy() {
            const text = document.getElementById('result').textContent;
            navigator.clipboard.writeText(text).then(() => alert('Tersalin!'));
        }
    </script>
</body>
</html>
